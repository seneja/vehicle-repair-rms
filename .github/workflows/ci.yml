name: VSRMS Professional CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Suite ──────────────────────────────────────────────────────────
  backend:
    name: Backend Analysis & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vsrms-backend
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './vsrms-backend/package-lock.json'

      - name: Install dependencies
        run: npm cache clean --force && npm ci

      - name: Dependency Security Audit
        run: npm audit --audit-level=high || echo "Audit found vulnerabilities, check details"

      - name: Run Backend Tests
        run: npm test -- --coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: vsrms-backend/coverage/
          retention-days: 7

  # ── Mobile Suite ───────────────────────────────────────────────────────────
  mobile:
    name: Mobile Analysis & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vsrms-mobile
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './vsrms-mobile/package-lock.json'

      - name: Install dependencies
        run: npm cache clean --force && npm ci

      - name: Lint Check
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Expo Doctor Check
        run: npx expo-doctor

      - name: Run Mobile Tests
        run: npm test -- --coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: vsrms-mobile/coverage/
          retention-days: 7

  # ── Deployment Threshold ────────────────────────────────────────────────────
  conclusion:
    name: Continuous Integration Status
    needs: [backend, mobile]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Professional Status Summary
        run: |
          echo "=== VSRMS CI Report ==="
          echo "Backend Job Result: ${{ needs.backend.result }}"
          echo "Mobile Job Result: ${{ needs.mobile.result }}"
          echo "========================"
          
          if [[ "${{ needs.backend.result }}" == "success" && "${{ needs.mobile.result }}" == "success" ]]; then
            echo "CI Passed Successfully"
            exit 0
          else
            echo "CI Failed in one or more suites"
            exit 1
          fi
