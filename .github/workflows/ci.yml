name: VSRMS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vsrms-backend
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './vsrms-backend/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Backend Tests (if any)
      run: npm test --passWithNoTests

  mobile-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vsrms-mobile
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './vsrms-mobile/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Expo Doctor Compatibility Check
      run: npx expo-doctor
